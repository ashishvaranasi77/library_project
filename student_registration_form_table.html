<!DOCTYPE html>
<html>
	<head>
	<title>Student Registration Form</title>
	</head>
	<body topmargin=0>
	<center>
	<table border="3">
	<tr>
	<th><h1> Student Registration Form </h1></th>
	<th><h1> ENTER INFORMATION </h1></th>
	</tr>
	<form>
	<tr>
	<td>Name:</td>
	<td><input type="text"placeholder="enter your name"></td>
	</tr>
	<tr>
	<td>Aadhaar Number:</td>
	<td><input type="number"placeholder="enter Aadhaar number"></td>
	</tr>
	<tr>
	<td>Mobile Number:</td>
	<td><input type="number"placeholder="enter mobile number"></td>
	</tr>
	<tr>
	<td>Email:</td>
	<td><input type="email"placeholder="enter your email"></td>
	</tr>
	<tr>
	<td>Password:</td>
	<td><input type="password"placeholder="enter password"></td>
	</tr>
	<tr>
	<td>Age:</td>
	<td><input type="number"placeholder="enter age"></td>
	</tr>
	<tr>
	<td>Gender:</td>
	<td><input type="radio" name="gender">Male
	<input type="radio" name="gender">Female</td>
	</tr>
	<tr>
	<td>Course:</td>
	<td><select>
	<option>CSE</option>
	<option>ECE</option>
	<option>EEE</option>
	<option>Mechanical</option>
	</select></td>
	</tr>
	<tr>
	<td>Hobbies:</td>
	<td><input type="checkbox">Coding
	<input type="checkbox">Gaming
	<input type="checkbox">Sports
	</td>
	</tr>
	<td>Address:</td>
	<td width="500"><textarea rows="5" cols="30" placeholder="enter address"></textarea></td>
	<tr>
	<td colspan="2" align="center">
	<button type="submit">register</button>
	<button type="reset">reset</button>
	</td>
	</tr>
	</form>
	</table>
	</body>
</html>
