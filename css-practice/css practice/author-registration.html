<!DOCTYPE html>
<html>
<head>
    <title>Author Registration Form</title>
    <link rel="stylesheet" href="style-registration.css">
</head>
<body>

    <nav>
    <a href="student-registration.html">Student Registration</a>
    <a href="book-registration.html">Book Registration</a>
    <a href="author-registration.html">Author Registration</a>
    </nav>
    <script>
        function validateAuthorForm()
        {
            var authorid = document.getElementById("authorid").value;
            var authorname = document.getElementById("authorname").value;
            var address = document.getElementById("address").value;

            if(authorid == "")
            {
                alert("Author ID is required");
                return false;
            }

            if(authorname == "")
            {
                alert("Author Name is required");
                return false;
            }

            if(address == "")
            {
                alert("Address is required");
                return false;
            }

            return true;
        }
    </script>

    <h1 align="center">Author Registration Form</h1>

    <table>
        <form action="/authorregister" method="post" onsubmit="return validateAuthorForm()">

            <tr>
                <th colspan="2">
                    <h4>
                        Author Information
                        <img src="images.png" alt="Image" width="30">
                    </h4>
                </th>
            </tr>

            <tr>
                <td>Author ID:</td>

                <td>
                    <input type="text" id="authorid" placeholder="enter author id">
                </td>
            </tr>

            <tr>
                <td>Author Name:</td>

                <td>
                    <input type="text" id="authorname" placeholder="enter author name">
                </td>
            </tr>

            <tr>
                <td>Address:</td>

                <td>
                    <textarea id="address" rows="4" cols="30" placeholder="enter address"></textarea>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <button type="submit">Register Author</button>

                    <button type="reset">Reset</button>
                </td>
            </tr>

        </form>
    </table>

</body>
</html>
