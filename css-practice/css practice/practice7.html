<!DOCTYPE html>
<html>
<head>
    <title>UL and OL Example</title>
    <link rel="stylesheet" type="text/css" href="style7.css">
</head>
<body>
    <h1>Unordered List</h1>
    <ul>
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
    </ul>
    <h1>Ordered List</h1>
    <ol start="1" reversed>
        <li>HTML</li>
        <li value="6">CSS</li>
        <li>JavaScript</li>
    </ol>
</body>
</html>
