<!DOCTYPE html>
<html>
<head>
<title>student-registration</title>
<link rel="stylesheet" href="style-registration.css">
</head>

<body>
    <h1 align="center">Student Registration Form</h1>

<table>


<tr>
<th colspan="2">Enter Information    <img src="images.png" alt="Image" width="30"></th>
</tr>

<tr>
<td>Full Name:</td>
<td><input type="text" placeholder="enter full name"></td>
</tr>

<tr>
<td>Mobile Number:</td>
<td><input type="number" placeholder="enter mobile number"></td>
</tr>

<tr>
<td>Email:</td>
<td><input type="email" placeholder="enter your email"></td>
</tr>

<tr>
<td>Password:</td>
<td><input type="password" placeholder="enter password"></td>
</tr>

<tr>
<td>Age:</td>
<td><input type="number" placeholder="enter age"></td>
</tr>

<tr>
<td>Gender:</td>
<td>
<input type="radio" name="gender">Male
<input type="radio" name="gender">Female
</td>
</tr>

<tr>
<td>Course:</td>
<td>
<select>
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
<option>MECH</option>
</select>
</td>
</tr>

<tr>
<td>Hobbies:</td>
<td>
<input type="checkbox">Coding
<input type="checkbox">Gaming
<input type="checkbox">Sports
</td>
</tr>

<tr>
<td>Address:</td>
<td>
<textarea rows="4" cols="30" placeholder="enter address"></textarea>
</td>
</tr>

<tr>
<td colspan="2" align="center">
<button>Register</button>
<button>Reset</button>
</td>
</tr>

</table>

</body>
</html>
